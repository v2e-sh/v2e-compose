# Phase F — local hooks mirroring CI. Install: pip install pre-commit && pre-commit install
# Bump pins with: pre-commit autoupdate  (Renovate also tracks these).
# Hadolint is added here once Dockerfiles land (Phase H / GHCR).
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
