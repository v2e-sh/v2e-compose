# Phase G — observability: Prometheus + Grafana + Loki/Alloy + Uptime Kuma (+ exporters).
# Only grafana and uptime-kuma get Traefik routes (TinyAuth-gated); everything else is
# internal-only, proxied through Grafana. Dozzle intentionally omitted (Arcane covers live
# container logs); Alertmanager omitted (Grafana unified alerting + Kuma notifications).
# Memory-limited throughout — the services node is a 4GB VM; totals stay ~1.2GiB hard cap.
services:
  prometheus:
    image: prom/prometheus:v3.13.0
    cap_drop:
      - ALL
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 288m
    cpus: 0.5
    networks:
      - observability
      - frontend # to scrape traefik:8082
    # node-exporter runs on the HOST network; reach it via the host gateway.
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  grafana:
    image: grafana/grafana:13.0.3
    cap_drop:
      - ALL
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 240m
    cpus: 0.5
    networks:
      - observability
      - frontend
    # The OAuth token/userinfo calls are BACKCHANNEL (container -> auth.int.v2e.sh):
    # the node's resolver doesn't know the internal zone (only clients with split-DNS
    # do), so pin the portal hostname at traefik's VLAN IP — same pattern as the
    # blackbox-exporter cert probes. TLS stays valid (LE wildcard via SNI).
    extra_hosts:
      - "auth.int.v2e.sh:10.1.2.10"
    environment:
      # Break-glass local login — keep until Authelia SSO is proven (and after, for DR).
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?set via the SOPS-rendered .env (grafana_admin_password)}
      - GF_SERVER_ROOT_URL=https://grafana.${INTERNAL_DOMAIN}/
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
      - GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES=false
      - GF_USERS_ALLOW_SIGN_UP=false
      # SSO via Authelia (generic OAuth). The router drops forward-auth: OIDC gates
      # Grafana directly (forward-auth + OIDC together would double-gate/loop).
      - GF_AUTH_GENERIC_OAUTH_ENABLED=true
      - GF_AUTH_GENERIC_OAUTH_NAME=Authelia
      - GF_AUTH_GENERIC_OAUTH_CLIENT_ID=grafana
      - GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET=${GRAFANA_OIDC_CLIENT_SECRET:?set via the SOPS-rendered .env (authelia_oidc_grafana_client_secret)}
      # NO offline_access: Authelia forces an explicit consent screen for that scope
      # regardless of consent_mode (live-verified). On token expiry Grafana just
      # re-runs the instant SSO redirect instead.
      - GF_AUTH_GENERIC_OAUTH_SCOPES=openid profile email groups
      - GF_AUTH_GENERIC_OAUTH_AUTH_URL=https://auth.${INTERNAL_DOMAIN}/api/oidc/authorization
      - GF_AUTH_GENERIC_OAUTH_TOKEN_URL=https://auth.${INTERNAL_DOMAIN}/api/oidc/token
      - GF_AUTH_GENERIC_OAUTH_API_URL=https://auth.${INTERNAL_DOMAIN}/api/oidc/userinfo
      - GF_AUTH_GENERIC_OAUTH_LOGIN_ATTRIBUTE_PATH=preferred_username
      - GF_AUTH_GENERIC_OAUTH_GROUPS_ATTRIBUTE_PATH=groups
      - GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH=contains(groups[*], 'grafana-admins') && 'Admin' || contains(groups[*], 'grafana-editors') && 'Editor' || 'Viewer'
      - GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN=true
      # Authelia client uses token_endpoint_auth_method client_secret_basic -> credentials
      # in the Authorization header, not the POST body.
      - GF_AUTH_GENERIC_OAUTH_AUTH_STYLE=InHeader
      # NOT enabling GF_AUTH_OAUTH_AUTO_LOGIN: the login form stays reachable so the
      # break-glass admin account keeps working.
    volumes:
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - ./config/grafana-alerting.yaml:/etc/grafana/provisioning/alerting/alerting.yaml:ro
      - grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.${INTERNAL_DOMAIN}`)
      - traefik.http.routers.grafana.entryPoints=websecure
      - traefik.http.routers.grafana.tls=true
      # No forward-auth: Grafana authenticates via Authelia OIDC directly.
      - traefik.http.routers.grafana.middlewares=secure-headers@docker
      - traefik.http.services.grafana.loadbalancer.server.port=3000

  loki:
    image: grafana/loki:3.7.3
    cap_drop:
      - ALL
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 192m
    cpus: 0.5
    networks:
      - observability
    environment:
      # Loki doesn't auto-tune to the cgroup limit; force GC before the OOM killer.
      - GOMEMLIMIT=160MiB
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./config/loki.yaml:/etc/loki/loki.yaml:ro
      - loki-data:/loki
    # No healthcheck: the loki image ships no shell/wget/curl. Readiness is scraped by
    # prometheus + alerted via grafana instead (GET /ready).

  alloy:
    image: grafana/alloy:v1.17.1
    cap_drop:
      - ALL
    cap_add:  # write its data dir (owned by the image's alloy uid, not root)
      - DAC_OVERRIDE
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 120m
    cpus: 0.25
    networks:
      - observability
    environment:
      - GOMEMLIMIT=100MiB
    # Override the image default (which binds the HTTP/metrics server to 127.0.0.1)
    # so Prometheus can scrape alloy:12345 over the observability network. Keep
    # --storage.path or Alloy loses the alloy-data volume. Args only (ENTRYPOINT
    # is /bin/alloy). Endpoint stays internal — not host-published, not via Traefik.
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./config/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki

  uptime-kuma:
    image: louislam/uptime-kuma:2.4.0-slim
    cap_drop:
      - ALL
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 140m
    cpus: 0.25
    networks:
      - observability
      - frontend
    volumes:
      - kuma-data:/app/data
    healthcheck:
      # Upstream ships this Go probe (its own Dockerfile HEALTHCHECK) — hits the local :3001 app.
      test: ["CMD", "extra/healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    labels:
      - traefik.enable=true
      - traefik.http.routers.uptime.rule=Host(`uptime.${INTERNAL_DOMAIN}`)
      - traefik.http.routers.uptime.entryPoints=websecure
      - traefik.http.routers.uptime.tls=true
      - traefik.http.routers.uptime.middlewares=authelia@docker,secure-headers@docker
      - traefik.http.services.uptime.loadbalancer.server.port=3001

  # Synthetic probes: TLS cert expiry, internal DNS resolution, tailnet node liveness.
  # Prometheus scrapes it with per-target `module`+`target` params (see prometheus.yml);
  # Grafana alerts on the resulting metrics. This is the declarative alternative to
  # Uptime Kuma click-ops — the whole probe set lives in git.
  blackbox-exporter:
    image: quay.io/prometheus/blackbox-exporter:v0.27.0
    cap_drop:
      - ALL
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 32m
    cpus: 0.25
    # NET_RAW is only needed for ICMP probes (the blackbox-tailnet job in prometheus.yml
    # is commented out). Re-add cap_add: [NET_RAW] here if that job is ever enabled.
    # frontend too (like prometheus): the cert/DNS probes must egress to the VLAN
    # (traefik 10.1.2.10, Technitium 10.1.0.10), not stay on the isolated obs bridge.
    networks:
      - observability
      - frontend
    # Deterministic resolution for the cert probe — don't depend on the container
    # resolver knowing int.v2e.sh; point the probed hostname straight at traefik so
    # SNI (whoami.int.v2e.sh) still selects the wildcard cert we're checking.
    extra_hosts:
      - "whoami.int.v2e.sh:10.1.2.10"
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/config.yml:ro

  node-exporter:
    image: prom/node-exporter:v1.11.1
    cap_drop:
      - ALL
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 24m
    cpus: 0.25
    command: ["--path.rootfs=/host"]
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.3
    cap_drop:
      - ALL
    cap_add:
      - SYSLOG          # read /dev/kmsg (host dmesg_restrict) for OOM/kernel events
      - DAC_READ_SEARCH # read cgroupfs subtrees owned by other uids (systemd user slices)
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 200m
    cpus: 0.5
    networks:
      - observability
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - --housekeeping_interval=30s
      - --docker_only=true
      - --store_container_labels=false
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  frontend:
    external: true
  observability: {}

volumes:
  # Named volumes (not ./data binds): these images run as non-root uids (grafana 472,
  # prometheus 65534, loki 10001) and root-owned bind dirs would break them.
  prometheus-data:
  grafana-data:
  loki-data:
  alloy-data:
  kuma-data:
