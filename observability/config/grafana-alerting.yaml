# One provisioned alert (the Phase G "one test alert" acceptance): fires when any
# Prometheus scrape target is down for 5m. Wire a notification channel (email/webhook)
# in the Grafana UI when wanted — the rule itself needs none to evaluate.
apiVersion: 1

groups:
  - orgId: 1
    name: v2e
    folder: v2e
    interval: 60s
    rules:
      - uid: target-down
        title: Scrape target down
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              # number of down targets (vector(0) keeps the series alive when all up)
              expr: count(up == 0) or vector(0)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [0], type: gt}
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "{{ $values.A.Value }} Prometheus scrape target(s) down"
