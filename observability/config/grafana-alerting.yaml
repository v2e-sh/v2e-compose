# Provisioned alert rules — the silent-failure modes that would otherwise be found
# only when something is already broken: a target down, a cert about to expire, a
# disk filling, memory pressure, internal DNS dead. Each rule evaluates standalone
# (no contact point required to fire); route them to a notification channel by
# setting a default contact point (see notificationPolicies below / SOLIDIFY doc).
apiVersion: 1

groups:
  - orgId: 1
    name: v2e
    folder: v2e
    interval: 60s
    rules:
      - uid: target-down
        title: Scrape target down
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              # number of down targets (vector(0) keeps the series alive when all up)
              expr: count(up == 0) or vector(0)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [0], type: gt}
        noDataState: OK
        execErrState: Alerting
        for: 5m
        labels: {severity: warning}
        annotations:
          summary: "{{ $values.A.Value }} Prometheus scrape target(s) down"

      # --- TLS certificate expiry (blackbox probe_ssl_earliest_cert_expiry) ---
      - uid: cert-expiry-warning
        title: TLS cert expiring soon (<21d)
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: prometheus
            model:
              # days until the wildcard cert expires (vector(999) = no data yet → not firing)
              expr: (min(probe_ssl_earliest_cert_expiry - time()) / 86400) or vector(999)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [21], type: lt}
        noDataState: OK
        execErrState: Alerting
        for: 1h
        labels: {severity: warning}
        annotations:
          summary: "*.int.v2e.sh cert expires in {{ $values.A.Value | printf \"%.0f\" }} days — LE renewal may be stuck"

      - uid: cert-expiry-critical
        title: TLS cert expiring imminently (<7d)
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 600, to: 0}
            datasourceUid: prometheus
            model:
              expr: (min(probe_ssl_earliest_cert_expiry - time()) / 86400) or vector(999)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [7], type: lt}
        noDataState: OK
        execErrState: Alerting
        for: 1h
        labels: {severity: critical}
        annotations:
          summary: "*.int.v2e.sh cert expires in {{ $values.A.Value | printf \"%.0f\" }} days — renew NOW"

      # --- Internal DNS (blackbox dns probe against Technitium) ---
      - uid: dns-internal-down
        title: Internal DNS resolution failing
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: min(probe_success{job="blackbox-dns"}) or vector(1)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [1], type: lt}
        noDataState: Alerting
        execErrState: Alerting
        for: 5m
        labels: {severity: critical}
        annotations:
          summary: "Technitium is not resolving int.v2e.sh — every app hostname is dark"

      # --- Disk space (node-exporter, real filesystems only) ---
      - uid: disk-low
        title: Disk space low (<15%)
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: >-
                min(node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|ramfs"}
                / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|ramfs"}) or vector(1)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [0.15], type: lt}
        noDataState: OK
        execErrState: Alerting
        for: 15m
        labels: {severity: warning}
        annotations:
          summary: "A filesystem on the services host is under 15% free ({{ $values.A.Value | printf \"%.0f%%\" }} remaining)"

      # --- Memory pressure (node-exporter) ---
      - uid: mem-high
        title: Host memory low (<10% available)
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) or vector(1)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [0.10], type: lt}
        noDataState: OK
        execErrState: Alerting
        for: 15m
        labels: {severity: warning}
        annotations:
          summary: "services host memory under 10% available — OOM risk on the app estate"

      # --- Authelia scrape down (the sole auth gate — SPOF). up==0 means the metrics
      # endpoint is unreachable: container down, crash-looping, or OOM-killed. ---
      - uid: authelia-down
        title: Authelia is down (auth gate)
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: min(up{job="authelia"}) or vector(0)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [1], type: lt}
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "Authelia metrics unreachable — every forward-auth app + OIDC login is at risk"

      # --- Auth-portal end-to-end down (blackbox 200 through Traefik -> Authelia).
      # Catches a broken auth PATH even if the container process looks alive. ---
      - uid: authelia-portal-down
        title: Auth portal not returning 200
        condition: C
        data:
          - refId: A
            relativeTimeRange: {from: 300, to: 0}
            datasourceUid: prometheus
            model:
              expr: min(probe_success{job="blackbox-authportal"}) or vector(1)
              refId: A
              instant: true
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange: {from: 0, to: 0}
            model:
              type: threshold
              refId: C
              expression: A
              conditions:
                - evaluator: {params: [1], type: lt}
        noDataState: Alerting
        execErrState: Alerting
        for: 2m
        labels: {severity: critical}
        annotations:
          summary: "auth.int.v2e.sh is not returning HTTP 200 — the login portal is broken"

# --- Contact points + policy (E3, extended charter 2026-07-07): route every
# alert to the self-hosted ntfy by default (previously the rules fired into
# the void). Grafana POSTs its alert JSON to the v2e-alerts topic over the
# observability network; subscribe from a phone/browser at
# https://ntfy.int.v2e.sh (Authelia-gated) -> topic "v2e-alerts".
#
# ntfy is a single point of failure for the notification path itself — a
# severity:critical alert (auth portal down, cert expiring imminently) needs
# a channel that doesn't depend on the same estate it's warning about. The
# "critical-multi" contact point below fans critical alerts to BOTH ntfy and
# Discord; everything else stays ntfy-only via the default/root policy.
contactPoints:
  - orgId: 1
    name: ntfy
    receivers:
      - uid: ntfy-v2e-alerts
        type: webhook
        settings:
          url: http://ntfy:8080/v2e-alerts
          httpMethod: POST
        disableResolveMessage: false

  - orgId: 1
    name: critical-multi
    receivers:
      - uid: ntfy-critical
        type: webhook
        settings:
          url: http://ntfy:8080/v2e-alerts
          httpMethod: POST
        disableResolveMessage: false
      # ${DISCORD_WEBHOOK_URL} is Grafana's own provisioning env-var expansion
      # (not docker-compose interpolation — this file is a static bind mount,
      # not passed through compose's ${VAR} substitution). Confirmed syntax
      # against grafana.com/docs/grafana/latest/alerting/set-up/
      # provision-alerting-resources/file-provisioning.
      - uid: discord-critical
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: ntfy
    group_by: ['grafana_folder', 'alertname']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      - receiver: critical-multi
        matchers:
          - severity = critical
        group_by: ['grafana_folder', 'alertname']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        continue: false
