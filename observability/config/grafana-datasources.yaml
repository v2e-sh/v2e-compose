apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: 30s # match prometheus scrape_interval
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
