# Single-binary Loki, filesystem storage, 14d retention. Schema v13 + tsdb is REQUIRED
# (3.x defaults allow_structured_metadata=true, which refuses older schemas).
auth_enabled: false

server:
  http_listen_port: 3100
  log_level: warn

common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules

schema_config:
  configs:
    - from: "2026-01-01"
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# Retention is OFF by default — the compactor enforces it.
compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem
  compaction_interval: 10m
  retention_delete_delay: 2h

limits_config:
  retention_period: 14d
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  allow_structured_metadata: true

ingester:
  chunk_encoding: snappy
  chunk_idle_period: 1h

querier:
  max_concurrent: 2

analytics:
  reporting_enabled: false
