services:
  whoami:
    image: traefik/whoami:v1.11.0
    cap_drop:
      - ALL
    cap_add:  # default binary binds :80
      - NET_BIND_SERVICE
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 64m
    cpus: 0.25
    networks:
      - frontend
    # No healthcheck: traefik/whoami is a scratch image (no shell/wget/curl). Liveness is
    # covered by Traefik's router state + uptime-kuma.
    labels:
      - traefik.enable=true
      - traefik.http.routers.whoami.rule=Host(`whoami.${INTERNAL_DOMAIN}`)
      - traefik.http.routers.whoami.entryPoints=websecure
      - traefik.http.routers.whoami.tls=true
      - traefik.http.routers.whoami.middlewares=secure-headers@docker
      - traefik.http.services.whoami.loadbalancer.server.port=80

networks:
  frontend:
    external: true
