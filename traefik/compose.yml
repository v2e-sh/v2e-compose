services:
  traefik:
    image: traefik:v3.7.6
    cap_drop:
      - ALL
    cap_add:  # bind :80/:443
      - NET_BIND_SERVICE
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1
    networks:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN:?set via `make up` (sops exec-env) or a local export}
    command:
      - --global.checkNewVersion=false
      - --global.sendAnonymousUsage=false
      - --log.level=INFO
      - --ping=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      - --providers.docker.network=frontend
      - --entryPoints.web.address=:80
      - --entryPoints.web.http.redirections.entryPoint.to=websecure
      - --entryPoints.web.http.redirections.entryPoint.scheme=https
      - --entryPoints.websecure.address=:443
      # Prometheus metrics on a dedicated entrypoint (:8082, container-internal only —
      # scraped by the observability stack over the frontend network, never published).
      - --entryPoints.metrics.address=:8082
      - --metrics.prometheus=true
      - --metrics.prometheus.entryPoint=metrics
      # --- staging resolver ---
      - --certificatesResolvers.staging.acme.email=${ACME_EMAIL}
      - --certificatesResolvers.staging.acme.storage=/certs/acme-staging.json
      - --certificatesResolvers.staging.acme.caServer=https://acme-staging-v02.api.letsencrypt.org/directory
      - --certificatesResolvers.staging.acme.dnsChallenge.provider=cloudflare
      # DNS-01 propagation: sleep 60s after the Cloudflare API write, then hand straight to
      # the ACME server (delayBeforeChecks + disableChecks map to lego's PropagationWait).
      # Do NOT enable local propagation checks on this network: the lab's WAN path runs a
      # caching transparent DNS interceptor, and lego's own zone lookup queries
      # _acme-challenge.<domain> a second BEFORE creating the TXT — the interceptor
      # negative-caches that NXDOMAIN (SOA min TTL 1800s), so every on-node check is
      # poisoned even while the real authoritative NS serve the record (verified live:
      # API + both authoritative NS had the TXT while the node saw NXDOMAIN for 120s).
      # Never pin `resolvers=1.1.1.1` either — same negative-cache trap. The 60s sleep
      # covers the observed <=10s API->authoritative propagation; Let's Encrypt validates
      # from its own resolvers, unaffected by lab DNS.
      - --certificatesResolvers.staging.acme.dnsChallenge.propagation.delayBeforeChecks=60s
      - --certificatesResolvers.staging.acme.dnsChallenge.propagation.disableChecks=true
      # --- production resolver ---
      - --certificatesResolvers.production.acme.email=${ACME_EMAIL}
      - --certificatesResolvers.production.acme.storage=/certs/acme.json
      - --certificatesResolvers.production.acme.caServer=https://acme-v02.api.letsencrypt.org/directory
      - --certificatesResolvers.production.acme.dnsChallenge.provider=cloudflare
      - --certificatesResolvers.production.acme.dnsChallenge.propagation.delayBeforeChecks=60s
      - --certificatesResolvers.production.acme.dnsChallenge.propagation.disableChecks=true
    volumes:
      - ./data/certs:/certs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - traefik.enable=true
      # Reusable security-headers middleware (HSTS omitted until prod cert).
      - traefik.http.middlewares.secure-headers.headers.frameDeny=true
      - traefik.http.middlewares.secure-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.secure-headers.headers.browserXssFilter=true
      - traefik.http.middlewares.secure-headers.headers.referrerPolicy=strict-origin-when-cross-origin
      # Dashboard router — PROTECTED, and it now carries the wildcard anchor (moved off whoami).
      - traefik.http.routers.dashboard.rule=Host(`traefik.${INTERNAL_DOMAIN}`)
      - traefik.http.routers.dashboard.entryPoints=websecure
      - traefik.http.routers.dashboard.service=api@internal
      - traefik.http.routers.dashboard.middlewares=auth@docker,secure-headers@docker
      - traefik.http.routers.dashboard.tls.certResolver=${CERT_RESOLVER:-staging}
      - traefik.http.routers.dashboard.tls.domains[0].main=${INTERNAL_DOMAIN}
      - traefik.http.routers.dashboard.tls.domains[0].sans=*.${INTERNAL_DOMAIN}
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  frontend:
    external: true
