services:
  tinyauth:
    image: ghcr.io/steveiliop56/tinyauth:v5.0.7
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.25
    networks:
      - frontend
    environment:
      - TINYAUTH_APPURL=https://tinyauth.${INTERNAL_DOMAIN}
      - TINYAUTH_AUTH_USERS=${TINYAUTH_AUTH_USERS:?set via `make up` (sops exec-env)}
      # --- v2e.sh branding (all non-secret) ---
      # Login-page title (default "Tinyauth") — the brand handle.
      - TINYAUTH_UI_TITLE=v2e.sh
      # Brand background from the mounted resources dir. TinyAuth serves resource
      # files under /resources/<name> (verified live: /resources/background.svg
      # returns the SVG; /background.svg hits the SPA fallback).
      - TINYAUTH_RESOURCES_PATH=/resources
      - TINYAUTH_UI_BACKGROUNDIMAGE=/resources/background.svg
      # Forgot-password copy tuned for this lab.
      - TINYAUTH_UI_FORGOTPASSWORDMESSAGE=Contact the admins to reset your access.
    volumes:
      - ./resources:/resources:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      - traefik.enable=true
      # Public login router — NO `auth` middleware (it cannot gate its own login).
      - traefik.http.routers.tinyauth.rule=Host(`tinyauth.${INTERNAL_DOMAIN}`)
      - traefik.http.routers.tinyauth.entryPoints=websecure
      - traefik.http.routers.tinyauth.tls=true
      - traefik.http.routers.tinyauth.middlewares=secure-headers@docker
      - traefik.http.services.tinyauth.loadbalancer.server.port=3000
      # Backend-neutral forward-auth middleware (named `auth`, not `tinyauth`).
      - traefik.http.middlewares.auth.forwardauth.address=http://tinyauth:3000/api/auth/traefik
      - traefik.http.middlewares.auth.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Email,Remote-Name

networks:
  frontend:
    external: true
