<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="v2e.sh">
  <!-- v2e.sh login background: brand dark base + hexagon mark watermark.
       Palette locked 2026-07-02 (base #212121, hero violet #9184B0). -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#2A2A2A"/>
      <stop offset="100%" stop-color="#1c1c1c"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <!-- flat-top hexagon mark, scaled from the 72-box brand path, centred -->
  <g transform="translate(800,450) scale(12) translate(-36,-36)"
     fill="none" stroke="#9184B0" stroke-opacity="0.16" stroke-width="2.2"
     stroke-linejoin="round" vector-effect="non-scaling-stroke">
    <path d="M58 36 L47 17 L25 17 L14 36 L25 55 L47 55 Z"/>
  </g>
  <!-- violet core dot -->
  <circle cx="800" cy="450" r="30" fill="#9184B0" fill-opacity="0.14"/>
</svg>
