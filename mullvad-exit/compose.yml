# Mullvad exit node — gluetun (Mullvad WireGuard) + a Tailscale sidecar that SHARES
# gluetun's network namespace, so any tailnet device selecting this node egresses
# through Mullvad. It is namespace-isolated: Mullvad's WireGuard never touches the
# host routing table, so this is safe to run beside the home DNS/relay (unlike
# running Mullvad on the host, which would hijack the node's routes — the same class
# of breakage as Mullvad-on-the-mac). Shows up in the exit-node picker as "mullvad",
# alongside the residential "home" exit.
#
# PORTABLE: identical to run standalone on a VPS — just supply the same env (see
# .env.example). In the lab, the env is rendered from SOPS by the compose_stack role.
#
# Mullvad creds (→ SOPS): account portal → WireGuard configuration → generate a key
# → download the .conf → take `PrivateKey` and `Address` from it. The key shown on
# the "Manage devices" page is NOT the private key; you must generate a config.
services:
  gluetun:
    image: qmcgaw/gluetun:v3.41.1
    restart: unless-stopped
    # no-new-privileges is compatible with cap_add: the NET_ADMIN cap is granted at
    # start; this only blocks setuid escalation, which gluetun never uses.
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.5
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=mullvad
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${MULLVAD_WIREGUARD_PRIVATE_KEY:?set via SOPS (mullvad_wireguard_private_key)}
      - WIREGUARD_ADDRESSES=${MULLVAD_WIREGUARD_ADDRESSES:?set via SOPS (mullvad_wireguard_addresses)}
      # Location pick (non-secret). Leave both empty for Mullvad's default.
      - SERVER_CITIES=${MULLVAD_SERVER_CITIES:-}
      - SERVER_COUNTRIES=${MULLVAD_SERVER_COUNTRIES:-}
      # Do NOT set FIREWALL_OUTBOUND_SUBNETS to the Tailscale range (100.64.0.0/10):
      # gluetun turns it into a policy route (prio 99: to 100.64/10 -> eth0) that
      # outranks tailscaled's own table 52, hijacking the return path of forwarded
      # exit traffic into the docker bridge — and strict rp_filter then drops the
      # inbound leg too, so the exit node blackholes before FORWARD is ever hit.
      # The sidecar doesn't need the bypass: its peer/DERP traffic rides INSIDE the
      # Mullvad tunnel (tun0), never addressed to 100.64/10 at the outer layer.
      - TZ=${TZ:-UTC}
    # No custom healthcheck: the gluetun image ships its own HEALTHCHECK that only
    # reports healthy once the VPN tunnel is actually up — which is exactly what the
    # tailscale sidecar's `depends_on: service_healthy` should gate on.

  tailscale:
    image: tailscale/tailscale:v1.98.4
    restart: unless-stopped
    # Userspace (netstack) mode needs no caps, so no-new-privileges is safe here.
    security_opt:
      - no-new-privileges:true
    # This container IS the exit node — it forwards all selected tailnet traffic
    # through gVisor netstack in userspace, which is memory-hungrier than kernel
    # mode. 256m gives headroom so concurrent exit flows can't OOM-flap the node.
    mem_limit: 256m
    cpus: 0.5
    # Share gluetun's netns → all of tailscaled's traffic (and any exit traffic it
    # forwards) leaves through the Mullvad tunnel. depends_on so the tunnel is up first.
    network_mode: service:gluetun
    depends_on:
      gluetun:
        condition: service_healthy
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY:?set via SOPS (tailscale_authkey — reuse the lab's reusable key)}
      - TS_EXTRA_ARGS=--advertise-exit-node --hostname=${MULLVAD_EXIT_HOSTNAME:-mullvad}
      - TS_STATE_DIR=/var/lib/tailscale
      # USERSPACE (netstack) mode — REQUIRED with gluetun, not a fallback. In kernel
      # mode, forwarded exit traffic fights gluetun on three fronts (split iptables
      # backends legacy/nft, FIREWALL_OUTBOUND_SUBNETS policy routes, and gluetun's
      # master "not fwmark -> VPN table" rule outranking tailscaled's table 52 +
      # strict rp_filter) — each one alone blackholes the exit. In netstack mode,
      # exit traffic leaves tailscaled as ordinary sockets in the shared netns,
      # which follow gluetun's own routing out the Mullvad tunnel by design. No
      # forwarding sysctls, NET_ADMIN, or /dev/net/tun needed on this container.
      - TS_USERSPACE=true
    volumes:
      - ./data/tailscale:/var/lib/tailscale

# NOTE: the kill-switch still holds for exit traffic: in netstack mode it egresses
# as netns-local sockets, which gluetun's firewall only permits out through the VPN
# tunnel — if Mullvad drops, traffic fails closed rather than leaking via eth0.
