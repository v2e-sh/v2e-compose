services:
  authelia:
    image: docker.io/authelia/authelia:4.39.20
    cap_drop:
      - ALL
    cap_add:  # the entrypoint su-exec's to PUID:PGID — setgroups/setuid need these.
      - SETUID
      - SETGID
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # 256m NOT 128m: argon2id verification is memory-hard (~64MiB per login with the
    # generated hash params) on top of the Go runtime + OIDC — at 128m the container was
    # OOM-killed (exit 137) mid-login, taking every forward-auth-gated app down with it.
    mem_limit: 256m
    cpus: 0.25
    networks:
      - frontend
    environment:
      # Portal + cookie host is baked into configuration.yml (static, mounted RO).
      - TZ=UTC
      # Run as (cap-limited) root: config/secrets are mounted read-only (the entrypoint's
      # chown -R /config fails harmlessly) and the data volume + 0640 secret files are only
      # readable/writable by root. no-new-privileges + the empty cap set keep it contained.
      # A non-root run would need the data volume + secret files pre-chowned to a fixed uid
      # — revisit at prod hardening.
      - PUID=0
      - PGID=0
      # --- Secrets: injected via env override (SOPS-rendered ../.env). These keys are
      #     intentionally ABSENT from configuration.yml — Authelia refuses to start if a
      #     secret is defined in BOTH the env and the YAML. ---
      - AUTHELIA_SESSION_SECRET=${AUTHELIA_SESSION_SECRET:?set via the SOPS-rendered .env (authelia_session_secret)}
      - AUTHELIA_STORAGE_ENCRYPTION_KEY=${AUTHELIA_STORAGE_ENCRYPTION_KEY:?set via the SOPS-rendered .env (authelia_storage_encryption_key)}
      - AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET=${AUTHELIA_RESET_PASSWORD_JWT_SECRET:?set via the SOPS-rendered .env (authelia_reset_password_jwt_secret)}
      # --- OIDC provider secrets ---
      - AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET=${AUTHELIA_OIDC_HMAC_SECRET:?set via the SOPS-rendered .env (authelia_oidc_hmac_secret)}
      # NOTE: the RS256 issuer key AND the per-client secret HASHES are INLINED into the
      # rendered configuration.yml from SOPS (Authelia's env override doesn't honor jwks/
      # client list indices) — see the templated config. The RP plaintext client secrets
      # (ARCANE_/GRAFANA_OIDC_CLIENT_SECRET) live in those stacks, added at migration.
    volumes:
      # configuration.yml (with the inlined RS256 key) + users_database.yml are rendered
      # out-of-band from SOPS by the compose_stack role — no key/hash in git.
      # config/configuration.yml.j2 is the tracked reference template. They are rendered
      # into /opt/authelia-secrets (OUTSIDE /opt/v2e-compose) so the Arcane container,
      # which bind-mounts the whole compose tree and starts as root, cannot read the IdP
      # signing key. This absolute path must match the role's authelia_secrets_dir default.
      - /opt/authelia-secrets/configuration.yml:/config/configuration.yml:ro
      - /opt/authelia-secrets/users_database.yml:/config/users_database.yml:ro
      # Writable state (sqlite db + filesystem notifier). Named volume, not a git-tracked
      # bind, mirroring the observability stack's non-root named-volume convention.
      - authelia-data:/data
    # Authelia's image already declares its own HEALTHCHECK (server.disable_healthcheck is
    # false in configuration.yml, so it stays active) — the binary health probe hits
    # :9091/api/health internally. No override needed; the built-in check drives restarts.
    labels:
      - traefik.enable=true
      # Public portal router — NO forward-auth middleware (it cannot gate its own login),
      # exactly like the old tinyauth router. OIDC endpoints live under this host too.
      - traefik.http.routers.authelia.rule=Host(`auth.${INTERNAL_DOMAIN}`)
      - traefik.http.routers.authelia.entryPoints=websecure
      - traefik.http.routers.authelia.tls=true
      - traefik.http.routers.authelia.middlewares=secure-headers@docker
      - traefik.http.services.authelia.loadbalancer.server.port=9091
      # Forward-auth middleware consumed by protected apps as `authelia@docker`.
      # Differences vs the old `auth`(tinyauth) middleware: endpoint /api/authz/forward-auth,
      # port 9091, and trustForwardHeader=true is REQUIRED (Authelia builds the login
      # redirect from X-Forwarded-*). authResponseHeaders are byte-identical to tinyauth's,
      # so apps consuming Remote-* keep working unchanged.
      - traefik.http.middlewares.authelia.forwardauth.address=http://authelia:9091/api/authz/forward-auth
      - traefik.http.middlewares.authelia.forwardauth.trustForwardHeader=true
      - traefik.http.middlewares.authelia.forwardauth.authResponseHeaders=Remote-User,Remote-Groups,Remote-Email,Remote-Name

networks:
  frontend:
    external: true

volumes:
  # Non-git-tracked writable state (Authelia writes db.sqlite3 + notification.txt here).
  authelia-data:
