name: ci
on:
  pull_request:
  push:
    branches: [main]
# Least privilege: every job only reads the repo (checkout). No job writes.
permissions:
  contents: read
jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Per-stack compose files (no root compose.yml). A placeholder env file
      # satisfies the ${VAR}/${VAR:?} interpolation; `config -q` validates every
      # stack's schema without a daemon. The values are throwaway CI dummies.
      - name: Validate all stacks
        run: |
          cat > "$RUNNER_TEMP/ci.env" <<'EOF'
          DOMAIN=example.com
          INTERNAL_DOMAIN=int.example.com
          ACME_EMAIL=a@b.c
          CERT_RESOLVER=staging
          CF_DNS_API_TOKEN=dummy
          ARCANE_ENCRYPTION_KEY=dummy
          ARCANE_JWT_SECRET=dummy
          ARCANE_OIDC_CLIENT_SECRET=dummy
          AUTHELIA_SESSION_SECRET=dummy
          AUTHELIA_STORAGE_ENCRYPTION_KEY=dummy
          AUTHELIA_RESET_PASSWORD_JWT_SECRET=dummy
          AUTHELIA_OIDC_HMAC_SECRET=dummy
          GRAFANA_ADMIN_PASSWORD=dummy
          GRAFANA_OIDC_CLIENT_SECRET=dummy
          MULLVAD_WIREGUARD_PRIVATE_KEY=dummy
          MULLVAD_WIREGUARD_ADDRESSES=10.0.0.2/32
          SEMAPHORE_DB_PASS=dummy
          SEMAPHORE_ADMIN_PASSWORD=dummy
          SEMAPHORE_ACCESS_KEY_ENCRYPTION=dummy
          SEMAPHORE_RUNNER_REG_TOKEN=dummy
          TAILSCALE_AUTHKEY=dummy
          TECHNITIUM_ADMIN_PASSWORD=dummy
          VAULTWARDEN_ADMIN_TOKEN=dummy
          EOF
          for stack in arcane authelia mullvad-exit observability rustdesk semaphore \
                       technitium traefik vaultwarden whoami; do
            echo "::group::$stack"
            docker compose --env-file "$RUNNER_TEMP/ci.env" -f "$stack/compose.yml" config -q
            echo "::endgroup::"
          done

  # Blocking: repo is currently secret-free; keep it that way.
  # --only-verified will not flag the placeholder values in *.example files.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the scan covers every commit, not just the tip.
          fetch-depth: 0
      - name: TruffleHog
        run: |
          docker run --rm -v "$PWD:/repo" trufflesecurity/trufflehog:3.95.8 \
            git file:///repo --only-verified --fail

  # Blocking: gitleaks pattern scan alongside TruffleHog (defense in depth).
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" ghcr.io/gitleaks/gitleaks:v8.30.1 \
            detect --source=/repo --no-git --redact --config=/repo/.gitleaks.toml

  # Advisory: Trivy IaC/compose misconfig scan.
  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Trivy config scan (advisory)
        run: |
          docker run --rm -v "$PWD:/repo" aquasec/trivy:0.72.0 \
            config /repo --severity HIGH,CRITICAL --exit-code 0
